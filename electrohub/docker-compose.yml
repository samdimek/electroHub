# Local development parity stack.
#
# NOTE on Vercel: Vercel builds and runs this Next.js app directly from
# source (its own build pipeline), it does not deploy arbitrary Docker
# images for serverless functions. This compose file exists so you can
# run Postgres, a local S3-compatible store (MinIO), and the app itself
# in containers for local dev / CI / or self-hosting outside Vercel.
# In production on Vercel you'll point DATABASE_URL / S3_* / Redis env
# vars at managed services (Neon/Vercel Postgres, AWS S3, Upstash) instead.
version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: electrohub
      POSTGRES_PASSWORD: electrohub
      POSTGRES_DB: electrohub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U electrohub"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "3000:3000"

volumes:
  pgdata:
  redisdata:
  miniodata:
